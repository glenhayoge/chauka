# fly.api.toml — SEPARATE deploy: backend only
# Deploy with:  fly deploy -c deploy/fly.api.toml  (from project root)

app = "chauka-api"
primary_region = "jnb"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  CHAUKA_ENVIRONMENT = "production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
