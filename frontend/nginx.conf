server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Hashed assets (Vite output) — immutable long-term cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — never cache so new deploys are picked up
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — route all unknown paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
