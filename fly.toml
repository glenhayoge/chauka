# fly.toml — SINGLE-IMAGE deploy (FastAPI serves React static files)
# Primary strategy: deploy with  fly deploy  from the project root.
#
# Before first deploy, set secrets:
#   fly secrets set CHAUKA_DATABASE_URL="postgresql+asyncpg://..." CHAUKA_SECRET_KEY="..."

app = "chauka"
primary_region = "syd"  # Sydney — adjust to your region

[build]
  dockerfile = "Dockerfile"

[env]
  CHAUKA_ENVIRONMENT = "production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 8000
    timeout = "5s"
    type = "http"
